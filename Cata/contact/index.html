<style>
*, :before, :after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #ececbb; --bg-muted: #dede9e; --fg: #239ba7; --fg-muted: #1c7a85;
  --border: #cde0b8; --primary: #239ba7; --primary-fg: #ececbb;
  --font-sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --radius: 0.5rem;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d2d30; --bg-muted: #154f54; --fg: #ececbb; --fg-muted: #b0b090;
    --border: #1a4a4d; --primary: #ececbb; --primary-fg: #0d2d30;
  }
}
html { scroll-behavior: smooth; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--fg); line-height: 1.6; }
.container { max-width: 48rem; margin: 0 auto; padding: 0 1.5rem; }
a { color: inherit; text-decoration: none; }

nav {
  position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border);
}
nav .container { display: flex; align-items: center; justify-content: space-between; height: 4rem; max-width: 80rem; }
nav .logo { font-weight: 700; font-size: 1.125rem; }
nav .nav-links { display: flex; gap: 0.5rem; }
nav .nav-links a { padding: 0.5rem 0.75rem; border-radius: var(--radius); font-size: 0.875rem; font-weight: 500; transition: background 0.2s; }
nav .nav-links a:hover { background: var(--bg-muted); }

.page-header { padding: 6rem 1.5rem 2rem; text-align: center; }
.page-header h1 { font-size: clamp(2rem, 5vw, 3.75rem); font-weight: 700; }
.page-header p { color: var(--fg-muted); margin-top: 0.5rem; font-size: 1.125rem; }

.contact-section { padding: 2rem 1.5rem 4rem; }
.contact-card {
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 2rem; text-align: center;
}
.contact-card .icon { width: 3rem; height: 3rem; margin: 0 auto 1rem; }
.contact-card h3 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
.contact-card p { color: var(--fg-muted); margin-bottom: 0.25rem; }
.contact-card a { color: var(--fg); font-weight: 500; }
.contact-card a:hover { text-decoration: underline; }

.contact-grid {
  display: grid; gap: 1.5rem; margin-top: 2rem;
}
@media (min-width: 640px) { .contact-grid { grid-template-columns: repeat(2, 1fr); } }

footer {
  border-top: 1px solid var(--border); padding: 2.5rem 1.5rem;
  text-align: center; color: var(--fg-muted); font-size: 0.875rem;
}
</style>
